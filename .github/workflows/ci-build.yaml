name: CI Build

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python - <<'PY'
          import pathlib
          import nose
          path = pathlib.Path(nose.__file__).parent / "suite.py"
          text = path.read_text()
          text = text.replace("collections.Callable", "collections.abc.Callable")
          if "import collections.abc" not in text:
              text = text.replace("import collections", "import collections\nimport collections.abc")
          path.write_text(text)
          PY

      - name: Run tests
        run: nosetests

      - name: Run flake8
        run: flake8 service tests || true

      - name: Run pylint
        run: pylint service || true
