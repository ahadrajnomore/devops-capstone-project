name: CI Build

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run nosetests
        run: |
          python - <<'PY'
          import collections
          import collections.abc
          collections.Callable = collections.abc.Callable
          import nose
          nose.run_exit()
          PY

      - name: Run flake8
        run: flake8 service tests || true

      - name: Run pylint
        run: pylint service || true
